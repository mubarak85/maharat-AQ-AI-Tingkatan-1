<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor AI Maharat Al-Quran T1</title>
    <style>
        :root {
            --primary-color: #0d5c3b;
            --secondary-color: #f4f7f6;
            --accent-color: #2e8b57;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--secondary-color);
            margin: 0;
            padding: 0;
            color: #333;
        }
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 1.5rem;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            transition: opacity 0.3s;
        }
        button.mic-btn {
            background-color: #d9534f;
        }
        button:hover {
            opacity: 0.9;
        }
        .response-box {
            margin-top: 20px;
            padding: 15px;
            background: #e8f4ed;
            border-left: 4px solid var(--accent-color);
            border-radius: 4px;
            display: none;
            line-height: 1.6;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <header>
        <h1>Tutor AI Maharat T1</h1>
        <p>Tanya Soalan Melalui Teks atau Suara</p>
    </header>

    <div class="container">
        <div class="form-group">
            <label for="userQuery">Taip soalan atau gunakan mikrofon:</label>
            <textarea id="userQuery" rows="4" placeholder="Contoh: Apakah definisi ilmu tajwid mengikut istilah?"></textarea>
        </div>

        <div class="btn-group">
            <button class="mic-btn" onclick="startSpeechRecognition()">🎙️ Cakap (Suara)</button>
            <button onclick="askAI()">Hantar Soalan</button>
        </div>

        <div id="responseBox" class="response-box">
            <strong>Jawapan Tutor AI:</strong>
            <p id="aiAnswerText">Sedang berfikir...</p>
        </div>
    </div>

    <script>
        function startSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert('Pelayar web anda tidak menyokong fungsi pengecaman suara. Sila guna Google Chrome.');
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'ms-MY';
            recognition.interimResults = false;

            recognition.onstart = function() {
                document.getElementById('userQuery').placeholder = "Sila bercakap sekarang...";
            };

            recognition.onresult = function(event) {
                const speechToText = event.results[0][0].transcript;
                document.getElementById('userQuery').value = speechToText;
                document.getElementById('userQuery').placeholder = "Taip soalan atau gunakan mikrofon...";
            };

            recognition.onerror = function(event) {
                alert('Ralat pengecaman suara: ' + event.error);
            };

            recognition.start();
        }

        async function askAI() {
            const query = document.getElementById('userQuery').value;
            const responseBox = document.getElementById('responseBox');
            const aiAnswerText = document.getElementById('aiAnswerText');

            if (!query.trim()) {
                alert('Sila taip atau cakap soalan anda dahulu.');
                return;
            }

            responseBox.style.display = 'block';
            aiAnswerText.innerHTML = "Sedang merujuk nota silibus Maharat Al-Quran Tingkatan 1...";

            const apiKey = "AQ.Ab8RN6I5bG9a6TQQGmh99A44oeB30etw0ssoWs2AZzBbmpp1RA"; 
            
            // URL tanpa parameter ?key=
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent`;

            const systemPrompt = `Anda adalah Tutor AI rasmi bagi subjek Maharat Al-Quran Tingkatan 1 KSSM. Anda mesti menjawab soalan pelajar secara tepat berdasarkan nota silibus rasmi berikut:

1. PRINSIP ILMU TAJWID:
- Definisi Bahasa: Al-Tahsin (memperelokkan). Istilah: Mengeluarkan setiap huruf dari makhrajnya berserta Haqq (sifat lazim seperti hams, jahr, qalqalah) dan Mustahaqq (sifat mendatang seperti tafkhim, tarqiq).
- Faedah: Melindungi lidah daripada kesalahan (lahn), mendapat keredaan Allah, pahala besar, dan kebahagiaan dunia akhirat.
- Pengasas: Amali oleh Rasulullah SAW; Teori oleh ulama Qiraat (Al-Khalil bin Ahmad, Abu Ubaid, dll).

2. HUKUM BELAJAR & AMAL:
- Mempelajari teori: Fardhu Kifayah. Mengamalkan (amali): Fardhu Ain. Dalil: Surah Al-Muzzammil ayat 4 & Hadis riwayat Ahmad.

3. KESILAPAN (AL-LAHN):
- Al-Lahn Al-Jali: Kesalahan nyata mencacatkan lafaz (Hukum: Haram/berdosa), cth tukar baris atau huruf (ص kepada س).
- Al-Lahn Al-Khafi: Kesalahan tersembunyi pada hukum halus (Hukum: Makruh), cth kurang dengung atau salah kadar mad.

4. PERINGKAT BACAAN:
- Al-Tahqiq (perlahan & teliti untuk pengajaran), Al-Tartil (perlahan & tadabbur), Al-Tadwir (sederhana), Al-Hadr (pantas tetapi jaga tajwid).

5. ISTI'ADAH & BASMALAH:
- Isti'adhah: 4 cara di awal surah (qat'u jami', waslu jami', dsb) dan 2 wajah di awal Surah Al-Tawbah (tanpa Basmalah).
- Basmalah: Wajib di awal setiap surah kecuali Al-Tawbah (kerana isu rahmah/jihad). Terdapat 3 cara sambungan ayat/surah.

6. HUKUM NUN SAKINAH & TAINWIN:
- Izhar Halqi (6 huruf kerongkong: ء ه ع ح غ خ), Idgham (Bighunnah: ي ن م و; Bila Ghunnah: ل ر) beserta Izhar Mutlaq (4 kalimah: الدنيا, بنيان, صنوان, قنوان), Iqlab (Bertemu ب tukar jadi م berdengung), Ikhfa' Haqiqi (15 huruf).

7. DEFINISI & KELEBIHAN AL-QURAN:
- Kalam Allah yang mukjizat, diturunkan kepada Nabi Muhammad SAW, ibadah membacanya, mutawatir, bermula Al-Fatihah berakhir An-Nas.
- Perbezaan Al-Quran (didengari/kalam Allah) dan Mushaf (naskhah fizikal).
- Kelebihan: Sebaik-baik manusia adalah yang belajar & mengajarnya. Bacaan Al-Quran lebih utama berbanding zikir lain.

Sila jawab soalan pelajar dalam Bahasa Melayu dengan jelas, berstruktur, dan merujuk terus kepada fakta di atas.`;

            const requestBody = {
                contents: [
                    {
                        parts: [
                            { text: systemPrompt + "\n\nSoalan Pelajar: " + query }
                        ]
                    }
                ]
            };

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "x-goog-api-key": apiKey // Kunci dihantar melalui header x-goog-api-key
                    },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();
                
                if (data.error) {
                    aiAnswerText.innerHTML = "Ralat API: " + (data.error.message || "Gagal mengesahkan kunci.");
                    return;
                }

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    aiAnswerText.innerHTML = data.candidates[0].content.parts[0].text;
                } else {
                    aiAnswerText.innerHTML = "Maaf, tiada jawapan yang dapat dijana buat masa ini.";
                }

            } catch (error) {
                aiAnswerText.innerHTML = "Ralat sambungan rangkaian ke pelayan AI.";
            }
        }
    </script>

</body>
</html>
