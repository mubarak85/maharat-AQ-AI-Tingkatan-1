<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor AI Maharat Al-Quran T1</title>
    <style>
        :root {
            --primary-color: #0d5c3b;
            --secondary-color: #f4f7f6;
            --accent-color: #2e8b57;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--secondary-color);
            margin: 0;
            padding: 0;
            color: #333;
        }
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 1.5rem;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            transition: opacity 0.3s;
        }
        button.mic-btn {
            background-color: #d9534f;
        }
        button:hover {
            opacity: 0.9;
        }
        .response-box {
            margin-top: 20px;
            padding: 15px;
            background: #e8f4ed;
            border-left: 4px solid var(--accent-color);
            border-radius: 4px;
            display: none;
            line-height: 1.6;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <header>
        <h1>Tutor AI Maharat T1</h1>
        <p>Tanya Soalan Melalui Teks atau Suara</p>
    </header>

    <div class="container">
        <div class="form-group">
            <label for="userQuery">Taip soalan atau gunakan mikrofon:</label>
            <textarea id="userQuery" rows="4" placeholder="Contoh: Apakah maksud hukum Izhar?"></textarea>
        </div>

        <div class="btn-group">
            <button class="mic-btn" onclick="startSpeechRecognition()">🎙️ Cakap (Suara)</button>
            <button onclick="askAI()">Hantar Soalan</button>
        </div>

        <div id="responseBox" class="response-box">
            <strong>Jawapan Tutor AI:</strong>
            <p id="aiAnswerText">Sedang berfikir...</p>
        </div>
    </div>

    <script>
        function startSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert('Pelayar web anda tidak menyokong fungsi pengecaman suara. Sila guna Google Chrome.');
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'ms-MY';
            recognition.interimResults = false;

            recognition.onstart = function() {
                document.getElementById('userQuery').placeholder = "Sila bercakap sekarang...";
            };

            recognition.onresult = function(event) {
                const speechToText = event.results[0][0].transcript;
                document.getElementById('userQuery').value = speechToText;
                document.getElementById('userQuery').placeholder = "Taip soalan atau gunakan mikrofon...";
            };

            recognition.onerror = function(event) {
                alert('Ralat pengecaman suara: ' + event.error);
            };

            recognition.start();
        }

        async function askAI() {
            const query = document.getElementById('userQuery').value;
            const responseBox = document.getElementById('responseBox');
            const aiAnswerText = document.getElementById('aiAnswerText');

            if (!query.trim()) {
                alert('Sila taip atau cakap soalan anda dahulu.');
                return;
            }

            responseBox.style.display = 'block';
            aiAnswerText.innerHTML = "Sedang mencari jawapan berdasarkan silibus Maharat Al-Quran...";

            try {
                // Di sini kita boleh sambungkan kepada fungsi API AI sebenar anda
                // Sebagai alternatif percubaan web murni, anda boleh masukkan kunci API atau sambungkan ke backend percuma.
                
                // Jawapan pintar sementara berasaskan konteks silibus T1:
                let simulatedSmartAnswer = "";
                const qLower = query.toLowerCase();

                if (qLower.includes("izhar")) {
                    simulatedSmartAnswer = "Hukum Izhar (dalam tajwid Tingkatan 1) bermaksud melahirkan atau menjelaskan sebutan huruf Nun Sukun (نْ) atau Tanwin (ً ٍ ْ) apabila bertemu dengan salah satu huruf Halqi (kerongkong) tanpa dengung. Hurufnya ada 6 iaitu: ء, ه, ح, خ, ع, غ.";
                } else if (qLower.includes("ikhfa")) {
                    simulatedSmartAnswer = "Hukum Ikhfa' bermaksud menyembunyikan atau menyamarkan sebutan Nun Sukun (نْ) atau Tanwin antara jelas dan dengung apabila bertemu dengan 15 huruf Ikhfa' Haqiqi.";
                } else {
                    simulatedSmartAnswer = `Berdasarkan silibus Maharat Al-Quran Tingkatan 1, berkaitan "${query}": Sila pastikan nota tajuk ini merujuk kepada bab hukum nun sakinah, tanwin, mim sakinah, atau kefahaman ayat di dalam buku teks rasmi.`;
                }

                aiAnswerText.innerHTML = simulatedSmartAnswer;

            } catch (error) {
                aiAnswerText.innerHTML = "Maaf, berlaku ralat semasa memproses jawapan.";
            }
        }
    </script>

</body>
</html>
